name: Python Bindings

on:
  push:
    branches: [main, 'feature/**']
    paths:
      - 'mermin-py/**'
      - 'mermin-core/**'
      - 'mermin-shape/**'
      - 'mermin-orient/**'
      - 'mermin-topo/**'
      - 'mermin-stats/**'
      - 'mermin-theory/**'
      - 'python/**'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - 'mermin-py/**'
      - 'mermin-core/**'
      - 'mermin-shape/**'
      - 'mermin-orient/**'
      - 'mermin-topo/**'
      - 'mermin-stats/**'
      - 'mermin-theory/**'
      - 'python/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

jobs:
  rust-check:
    name: Rust compile check (mermin-py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check mermin-py compiles
        run: cargo check -p mermin-py

  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: rust-check
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: py-${{ matrix.python-version }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtualenv and install deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest numpy scipy

      - name: Build and install (dev mode)
        run: |
          source .venv/bin/activate
          cd mermin-py
          maturin develop --release

      - name: Verify import
        run: |
          source .venv/bin/activate
          python -c "from mermin._native import analyze_shape; print('mermin._native loaded')"

      - name: Run smoke tests
        run: |
          source .venv/bin/activate
          pytest tests/test_smoke.py -v --tb=short -x

  wheel-smoke:
    name: Wheel smoke test
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheel and test in clean venv
        run: |
          pip install maturin
          cd mermin-py && maturin build --release --out dist
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install dist/mermin-*.whl numpy
          /tmp/smoke-venv/bin/python -c "
          from mermin._native import analyze_shape
          import numpy as np
          pts = np.array([[np.cos(i*np.pi/3), np.sin(i*np.pi/3)] for i in range(6)])
          result = analyze_shape(pts)
          assert result['area'] > 0
          print(f'Hexagon area = {result[\"area\"]:.4f}, elongation = {result[\"elongation\"]:.4f}')
          print('Smoke test passed')
          "
