name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Rust tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --workspace --exclude mermin-py
      - name: Test workspace
        run: cargo test --workspace --exclude mermin-py
      - name: Clippy
        run: cargo clippy --workspace --exclude mermin-py -- -D warnings
      - name: Format check
        run: cargo fmt --all --check
